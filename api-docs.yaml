openapi: 3.0.0
info:
  title: GoMQTT REST API
  description: |
    REST API for GoMQTT, a modern MQTT broker. This API allows monitoring and management of the broker including 
    clients, topics, subscriptions, and messages.
  version: 1.0.0
  contact:
    name: GoMQTT Team
    url: https://github.com/mstgnz/gomqtt
servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://mqtt.example.com/api
    description: Example production server

tags:
  - name: Clients
    description: Operations about MQTT clients
  - name: Messages
    description: Operations about MQTT messages
  - name: Topics
    description: Operations about MQTT topics
  - name: Stats
    description: Operations about broker statistics
  - name: Auth
    description: Authentication operations

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate to the API
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin_password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for API authentication
                  expires_at:
                    type: string
                    format: date-time
                    description: Token expiration time
        '401':
          description: Unauthorized - Invalid credentials
        '400':
          description: Bad request - Invalid input format

  /clients:
    get:
      tags:
        - Clients
      summary: Get all connected clients
      operationId: getClients
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of clients to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of clients to skip
      responses:
        '200':
          description: List of clients returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of connected clients
                  clients:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized - Invalid or missing token
        '403':
          description: Forbidden - Not enough permissions

  /clients/{clientId}:
    get:
      tags:
        - Clients
      summary: Get client by ID
      operationId: getClientById
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: Client ID to fetch
      responses:
        '200':
          description: Client details returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized - Invalid or missing token
        '404':
          description: Client not found
    delete:
      tags:
        - Clients
      summary: Disconnect a client
      operationId: disconnectClient
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: Client ID to disconnect
      responses:
        '200':
          description: Client disconnected successfully
        '401':
          description: Unauthorized - Invalid or missing token
        '404':
          description: Client not found

  /clients/{clientId}/subscriptions:
    get:
      tags:
        - Clients
      summary: Get client subscriptions
      operationId: getClientSubscriptions
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: Client ID to fetch subscriptions for
      responses:
        '200':
          description: Client subscriptions returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
        '401':
          description: Unauthorized - Invalid or missing token
        '404':
          description: Client not found

  /messages:
    get:
      tags:
        - Messages
      summary: Get message history
      operationId: getMessages
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: query
          schema:
            type: string
          description: Filter messages by topic (supports wildcards)
        - name: client_id
          in: query
          schema:
            type: string
          description: Filter messages by client ID
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
          description: Filter messages published after this time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
          description: Filter messages published before this time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of messages to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of messages to skip
      responses:
        '200':
          description: Message history returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of messages matching the filter
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized - Invalid or missing token
    post:
      tags:
        - Messages
      summary: Publish a message
      operationId: publishMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '201':
          description: Message published successfully
        '400':
          description: Bad request - Invalid input format
        '401':
          description: Unauthorized - Invalid or missing token

  /topics:
    get:
      tags:
        - Topics
      summary: Get all active topics
      operationId: getTopics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of topics returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Topic'
        '401':
          description: Unauthorized - Invalid or missing token

  /topics/{topic}:
    get:
      tags:
        - Topics
      summary: Get topic details
      operationId: getTopicDetails
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: Topic name
      responses:
        '200':
          description: Topic details returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
        '401':
          description: Unauthorized - Invalid or missing token
        '404':
          description: Topic not found

  /topics/{topic}/subscribers:
    get:
      tags:
        - Topics
      summary: Get subscribers for a topic
      operationId: getTopicSubscribers
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: Topic name
      responses:
        '200':
          description: Topic subscribers returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized - Invalid or missing token
        '404':
          description: Topic not found

  /stats:
    get:
      tags:
        - Stats
      summary: Get broker statistics
      operationId: getStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistics returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'
        '401':
          description: Unauthorized - Invalid or missing token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Client:
      type: object
      properties:
        client_id:
          type: string
          description: Client identifier
        username:
          type: string
          description: Client username (if authenticated)
        connected_at:
          type: string
          format: date-time
          description: Connection time
        remote_address:
          type: string
          description: Client IP address
        protocol_version:
          type: string
          description: MQTT protocol version (3.1.1 or 5.0)
        clean_session:
          type: boolean
          description: Whether the client requested a clean session
        keep_alive:
          type: integer
          description: Keep alive interval in seconds
        is_connected:
          type: boolean
          description: Current connection status
        subscription_count:
          type: integer
          description: Number of topics this client is subscribed to
        will_message:
          type: object
          properties:
            topic:
              type: string
              description: Topic of the will message
            qos:
              type: integer
              description: QoS level (0, 1, or 2)
            retain:
              type: boolean
              description: Retain flag

    Subscription:
      type: object
      properties:
        topic:
          type: string
          description: Topic filter
        qos:
          type: integer
          description: QoS level (0, 1, or 2)
        client_id:
          type: string
          description: Client identifier
        created_at:
          type: string
          format: date-time
          description: Subscription creation time

    Message:
      type: object
      properties:
        id:
          type: string
          description: Message unique identifier
        topic:
          type: string
          description: Topic the message was published to
        payload:
          type: string
          description: Message payload (base64 encoded if binary)
        qos:
          type: integer
          description: QoS level (0, 1, or 2)
        retained:
          type: boolean
          description: Retain flag
        publish_time:
          type: string
          format: date-time
          description: Time the message was published
        client_id:
          type: string
          description: Client identifier that published the message
        payload_format:
          type: string
          enum: [text, base64]
          description: Format of the payload field

    PublishRequest:
      type: object
      required:
        - topic
        - payload
      properties:
        topic:
          type: string
          description: Topic to publish to
        payload:
          type: string
          description: Message payload (text or base64 encoded binary)
        qos:
          type: integer
          enum: [0, 1, 2]
          default: 0
          description: QoS level (0, 1, or 2)
        retained:
          type: boolean
          default: false
          description: Retain flag
        payload_format:
          type: string
          enum: [text, base64]
          default: text
          description: Format of the payload field

    Topic:
      type: object
      properties:
        name:
          type: string
          description: Topic name
        subscriber_count:
          type: integer
          description: Number of subscribers
        retained_message:
          type: object
          properties:
            payload:
              type: string
              description: Retained message payload (base64 encoded if binary)
            qos:
              type: integer
              description: QoS level (0, 1, or 2)
            publish_time:
              type: string
              format: date-time
              description: Time the retained message was published
            payload_format:
              type: string
              enum: [text, base64]
              description: Format of the payload field

    Stats:
      type: object
      properties:
        uptime:
          type: string
          description: Broker uptime in human-readable format
        version:
          type: string
          description: GoMQTT version
        start_time:
          type: string
          format: date-time
          description: Broker start time
        connections:
          type: object
          properties:
            current:
              type: integer
              description: Current connections
            total:
              type: integer
              description: Total connections since startup
            max:
              type: integer
              description: Maximum concurrent connections
        messages:
          type: object
          properties:
            received:
              type: integer
              description: Total messages received
            sent:
              type: integer
              description: Total messages sent
            stored:
              type: integer
              description: Total messages stored in database
            retained:
              type: integer
              description: Total retained messages
        memory:
          type: object
          properties:
            allocated:
              type: string
              description: Memory currently allocated
            system:
              type: string
              description: System memory used
        topics:
          type: integer
          description: Number of active topics
        subscriptions:
          type: integer
          description: Number of active subscriptions 