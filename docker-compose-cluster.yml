services:
  postgres:
    image: postgres:latest
    container_name: gomqtt-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: gomqtt
    ports:
      - "5432:5432"
    networks:
      - gomqtt_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gomqtt-redis
    ports:
      - "6379:6379"
    networks:
      - gomqtt_network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # HAProxy load balancer for MQTT traffic
  haproxy:
    image: haproxy:latest
    ports:
      - "1883:1883" # MQTT
      - "8883:8883" # MQTTS
      - "9001:9001" # WebSocket
      - "9443:9443" # Secure WebSocket
      - "8404:8404" # HAProxy stats
    volumes:
      - ./haproxy:/usr/local/etc/haproxy:ro
    depends_on:
      - gomqtt-node1
      - gomqtt-node2
      - gomqtt-node3
    networks:
      - gomqtt_network

  # GoMQTT Broker - Node 1
  gomqtt-node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gomqtt-node1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "1883:1883" # MQTT
      - "8883:8883" # MQTTS
      - "9001:9001" # WebSocket
      - "8080:8080" # API
      - "8081:8081" # Admin panel
      - "7946:7946" # Cluster port
    networks:
      - gomqtt_network
    volumes:
      - ./config/cluster-node1.json:/app/config.json:ro
      - ./certs:/app/certs:ro
    environment:
      - GOMQTT_NODE_ID=node1
      - GOMQTT_NODE_HOST=gomqtt-node1
      - GOMQTT_CLUSTER_ENABLED=true
      - GOMQTT_CLUSTER_SEEDS=gomqtt-node1:7946,gomqtt-node2:7946,gomqtt-node3:7946

  # GoMQTT Broker - Node 2
  gomqtt-node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gomqtt-node2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "1884:1883" # MQTT (mapped to different host port)
      - "8884:8883" # MQTTS (mapped to different host port)
      - "9002:9001" # WebSocket (mapped to different host port)
      - "8082:8080" # API (mapped to different host port)
      - "8083:8081" # Admin panel (mapped to different host port)
      - "7947:7946" # Cluster port (mapped to different host port)
    networks:
      - gomqtt_network
    volumes:
      - ./config/cluster-node2.json:/app/config.json:ro
      - ./certs:/app/certs:ro
    environment:
      - GOMQTT_NODE_ID=node2
      - GOMQTT_NODE_HOST=gomqtt-node2
      - GOMQTT_CLUSTER_ENABLED=true
      - GOMQTT_CLUSTER_SEEDS=gomqtt-node1:7946,gomqtt-node2:7946,gomqtt-node3:7946

  # GoMQTT Broker - Node 3
  gomqtt-node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gomqtt-node3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "1885:1883" # MQTT (mapped to different host port)
      - "8885:8883" # MQTTS (mapped to different host port)
      - "9003:9001" # WebSocket (mapped to different host port)
      - "8084:8080" # API (mapped to different host port)
      - "8085:8081" # Admin panel (mapped to different host port)
      - "7948:7946" # Cluster port (mapped to different host port)
    networks:
      - gomqtt_network
    volumes:
      - ./config/cluster-node3.json:/app/config.json:ro
      - ./certs:/app/certs:ro
    environment:
      - GOMQTT_NODE_ID=node3
      - GOMQTT_NODE_HOST=gomqtt-node3
      - GOMQTT_CLUSTER_ENABLED=true
      - GOMQTT_CLUSTER_SEEDS=gomqtt-node1:7946,gomqtt-node2:7946,gomqtt-node3:7946

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./gomqtt", "api"]
    ports:
      - "8080:8080"
    volumes:
      - ./config/api-config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gomqtt_network
    environment:
      - GOMQTT_BROKER_NODES=gomqtt-node1:7946,gomqtt-node2:7946,gomqtt-node3:7946

  # Admin UI
  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "8081:8081"
    depends_on:
      - api-gateway
    networks:
      - gomqtt_network
    environment:
      - GOMQTT_API_URL=http://api-gateway:8080

networks:
  gomqtt_network:
    driver: bridge

volumes:
  postgres_data:
  redis-data:
