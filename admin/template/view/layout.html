<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoMQTT Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.8"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f5f5f5;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            padding-top: 20px;
        }
        .sidebar a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            margin: 5px 0;
        }
        .sidebar a:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
            border-radius: 4px;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .logo span {
            color: #0d6efd;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">Go<span>MQTT</span></div>
        <nav>
            <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="/clients" class="{{if eq .Active "clients"}}active{{end}}">
                <i class="bi bi-people"></i> Clients
            </a>
            <a href="/messages" class="{{if eq .Active "messages"}}active{{end}}">
                <i class="bi bi-chat-dots"></i> Messages
            </a>
            <a href="/settings" class="{{if eq .Active "settings"}}active{{end}}">
                <i class="bi bi-gear"></i> Settings
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="container-fluid">
            {{ template "content" . }}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
