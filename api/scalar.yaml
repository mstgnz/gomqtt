name: GoMQTT API
description: GoMQTT API Documentation
version: 1.0.0

components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization

security:
  - BearerAuth: []

servers:
  - name: Development
    url: http://localhost:8010
  - name: Production
    url: https://gomqtt.com/api

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Bring
    description: Data fetching endpoints
  - name: Vehicle
    description: Vehicle management endpoints

paths:
  /verify:
    get:
      tags:
        - Auth
      summary: User Verify
      description: Verifies a user's authentication token
      security:
        - BearerAuth: []
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  success:
                    type: boolean
                  message:
                    type: string
              example:
                code: 200
                success: true
                message: Success

  /login:
    post:
      tags:
        - Auth
      summary: User Login
      description: Authenticates a user and returns an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email_or_phone
                - password
              properties:
                email_or_phone:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          firstname:
                            type: string
                          lastname:
                            type: string
                          email:
                            type: string
                          phone:
                            type: string
              example:
                status: true
                message: Success
                data:
                  token: eyJhbGciOiJIUzI.eyJpc3MiOiIxIiwiZXhwI.yyMRyoRa1H8sjqwajdVUyK
                  user:
                    id: 1
                    firstname: John
                    lastname: DOE
                    email: johndone@gmail.com
                    phone: "5432222222"
          x-success:
            type: bearer
            property: data.token

  /register:
    post:
      tags:
        - Auth
      summary: User Registration
      description: Registers a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstname
                - lastname
                - email
                - password
                - phone
                - city_id
                - district_id
                - town_id
                - address
              properties:
                firstname:
                  type: string
                lastname:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                phone:
                  type: string
                city_id:
                  type: integer
                district_id:
                  type: integer
                town_id:
                  type: integer
                address:
                  type: string
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          firstname:
                            type: string
                          lastname:
                            type: string
                          email:
                            type: string
                          phone:
                            type: string
              example:
                status: true
                message: Success
                data:
                  token: eyJhbGciOiJIUzI.eyJpc3MiOiIxIiwiZXhwI.yyMRyoRa1H8sjqwajdVUyK
                  user:
                    id: 1
                    firstname: John
                    lastname: DOE
                    email: johndone@gmail.com
                    phone: "5432222222"
          x-success:
            type: bearer
            property: data.token

  /verify-code:
    post:
      tags:
        - Auth
      summary: User Verify Code

  /forgot-password:
    post:
      tags:
        - Auth
      summary: User Forgot Password

  /change-password:
    post:
      tags:
        - Auth
      summary: User Change Password

  /bring/cities:
    get:
      tags:
        - Bring
      summary: Get Cities
      description: Returns list of available cities
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
              example:
                status: true
                message: Success
                data:
                  - id: 1
                    name: Ankara

  /bring/districts:
    get:
      tags:
        - Bring
      summary: Get Districts
      description: Returns list of districts in a city
      parameters:
        - name: city_id
