openapi: 3.0.0
info:
  title: GoMQTT API
  description: |
    REST API for managing GoMQTT, a modern MQTT broker.
    This API provides endpoints for managing clients, messages, users, permissions, and roles.
  version: 1.0.0
  contact:
    name: GoMQTT Team
    url: https://github.com/mstgnz/gomqtt
x-scalar:
  title: GoMQTT REST API
  logo: /assets/logo.svg
  theme:
    colors:
      primary:
        main: "#0096FF"
      success:
        main: "#00C853"
      error:
        main: "#FF5252"
      accent:
        main: "#536DFE"
    sidebar:
      width: 260px
    typography:
      fontFamily: Inter, system-ui, sans-serif
    codeBlock:
      defaultLanguage: json
    logo:
      maxWidth: 150px
  favicon: https://via.placeholder.com/32x32/0096FF/FFFFFF?text=G
  navigation:
    - group: Getting Started
      items:
        - title: Introduction
          content: |
            # GoMQTT REST API
            
            This is the API documentation for GoMQTT, a modern MQTT broker.
            The API provides endpoints for managing clients, messages, users, permissions, and roles.
            
            ## Authentication
            
            Most API endpoints require authentication using a JWT token.
            To obtain a token, use the `/api/login` endpoint with valid credentials.
            Include the token in the `Authorization` header as `Bearer <token>` for authenticated requests.
    - group: Endpoints
      items:
        - title: Authentication
          operationIds:
            - login
        - title: Clients
          operationIds:
            - listClients
            - getClient
        - title: Messages
          operationIds:
            - listMessages
            - publishMessage
        - title: Users
          operationIds:
            - listUsers
            - createUser
            - getUser
            - deleteUser
        - title: Permissions
          operationIds:
            - listPermissions
            - createPermission
            - getUserPermissions
            - deletePermission
        - title: Roles
          operationIds:
            - listRoles
            - createRole
            - getRole
            - updateRole
            - deleteRole
            - assignRoleToUser
            - removeRoleFromUser
            - getUserRoles
        - title: History
          operationIds:
            - getMessageHistory
            - getMessageTopics
            - getTopicHistory
            - getClientHistory
        - title: System
          operationIds:
            - apiRoot
            - healthCheck
servers:
  - url: http://localhost:8080
    description: Development server
tags:
  - name: Authentication
    description: Authentication endpoints
  - name: Clients
    description: MQTT client management
  - name: Messages
    description: MQTT message management
  - name: Users
    description: User management
  - name: Permissions
    description: Permission management
  - name: Roles
    description: Role-based access control (RBAC)
  - name: History
    description: Message history
  - name: System
    description: System operations

paths:
  /:
    get:
      operationId: apiRoot
      summary: API root
      description: Basic information about the API
      tags:
        - System
      responses:
        '200':
          description: Basic API information
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  version:
                    type: string

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Checks the health of all system components
      tags:
        - System
      responses:
        '200':
          description: Health status of all components
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  services:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                          enum: [ok, error, unknown]
                        message:
                          type: string

  /api/login:
    post:
      operationId: login
      summary: Login
      description: Authenticate to get an access token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        '401':
          description: Invalid credentials

  /api/clients:
    get:
      operationId: listClients
      summary: List clients
      description: Get a list of all connected MQTT clients
      tags:
        - Clients
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized

  /api/clients/{clientID}:
    get:
      operationId: getClient
      summary: Get client
      description: Get details for a specific MQTT client
      tags:
        - Clients
      security:
        - bearerAuth: []
      parameters:
        - name: clientID
          in: path
          required: true
          schema:
            type: string
          description: The client ID
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized
        '404':
          description: Client not found

  /api/messages:
    get:
      operationId: listMessages
      summary: List messages
      description: Get a list of messages with optional filtering
      tags:
        - Messages
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized

  /api/publish:
    post:
      operationId: publishMessage
      summary: Publish message
      description: Publish a message to a specific topic
      tags:
        - Messages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
                - payload
              properties:
                topic:
                  type: string
                  description: Topic to publish to
                payload:
                  type: string
                  description: Message content
                qos:
                  type: integer
                  enum: [0, 1, 2]
                  default: 0
                  description: Quality of Service
                retain:
                  type: boolean
                  default: false
                  description: Whether to retain message
      responses:
        '200':
          description: Message published successfully
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions for topic

  /api/permissions:
    get:
      operationId: listPermissions
      summary: List permissions
      description: Get a list of all permissions
      tags:
        - Permissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'
        '401':
          description: Unauthorized
    post:
      operationId: createPermission
      summary: Create permission
      description: Create a new permission
      tags:
        - Permissions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
      responses:
        '201':
          description: Permission created successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  /api/permissions/{username}:
    get:
      operationId: getUserPermissions
      summary: Get user permissions
      description: Get permissions for a specific user
      tags:
        - Permissions
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
      responses:
        '200':
          description: List of user permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /api/permissions/{username}/{topic}:
    delete:
      operationId: deletePermission
      summary: Delete permission
      description: Delete a specific permission
      tags:
        - Permissions
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: The topic pattern
      responses:
        '200':
          description: Permission deleted successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '404':
          description: Permission not found

  /api/users:
    get:
      operationId: listUsers
      summary: List users
      description: Get a list of all users
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    post:
      operationId: createUser
      summary: Create user
      description: Create a new user
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required

  /api/users/{username}:
    get:
      operationId: getUser
      summary: Get user
      description: Get details for a specific user
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: User not found
    delete:
      operationId: deleteUser
      summary: Delete user
      description: Delete a specific user
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
      responses:
        '204':
          description: User deleted successfully
        '400':
          description: Cannot delete your own account
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: User not found

  /api/roles:
    get:
      operationId: listRoles
      summary: List roles
      description: Get a list of all roles
      tags:
        - Roles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '501':
          description: RBAC not enabled
    post:
      operationId: createRole
      summary: Create role
      description: Create a new role
      tags:
        - Roles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '501':
          description: RBAC not enabled

  /api/roles/{roleName}:
    get:
      operationId: getRole
      summary: Get role
      description: Get details for a specific role
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
          description: The role name
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: Role not found
        '501':
          description: RBAC not enabled
    put:
      operationId: updateRole
      summary: Update role
      description: Update a specific role
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
          description: The role name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: Role not found
        '501':
          description: RBAC not enabled
    delete:
      operationId: deleteRole
      summary: Delete role
      description: Delete a specific role
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
          description: The role name
      responses:
        '204':
          description: Role deleted successfully
        '400':
          description: Cannot delete default role
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: Role not found
        '501':
          description: RBAC not enabled

  /api/roles/{roleName}/users/{username}:
    post:
      operationId: assignRoleToUser
      summary: Assign role to user
      description: Assign a role to a specific user
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
          description: The role name
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
      responses:
        '204':
          description: Role assigned successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: Role or user not found
        '501':
          description: RBAC not enabled
    delete:
      operationId: removeRoleFromUser
      summary: Remove role from user
      description: Remove a role from a specific user
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: roleName
          in: path
          required: true
          schema:
            type: string
          description: The role name
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
      responses:
        '204':
          description: Role removed successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required
        '404':
          description: Role or user not found
        '501':
          description: RBAC not enabled

  /api/roles/users/{username}:
    get:
      operationId: getUserRoles
      summary: Get user roles
      description: Get roles for a specific user
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: The username
      responses:
        '200':
          description: List of user roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          description: Unauthorized
        '403':
          description: Admin privileges required for other users
        '404':
          description: User not found
        '501':
          description: RBAC not enabled

  /api/history:
    get:
      operationId: getMessageHistory
      summary: Get message history
      description: Get message history with filtering
      tags:
        - History
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: query
          schema:
            type: string
          description: Filter by topic
        - name: client_id
          in: query
          schema:
            type: string
          description: Filter by client ID
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by messages after this timestamp (RFC3339 format)
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by messages before this timestamp (RFC3339 format)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Limit number of results
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Result offset for pagination
      responses:
        '200':
          description: Message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          description: Invalid parameters
        '401':
          description: Unauthorized
        '503':
          description: Storage not available

  /api/history/topics:
    get:
      operationId: getMessageTopics
      summary: Get message topics
      description: Get distinct topics from message history
      tags:
        - History
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          description: Unauthorized
        '501':
          description: Not implemented

  /api/history/topics/{topic}:
    get:
      operationId: getTopicHistory
      summary: Get topic history
      description: Get message history for a specific topic
      tags:
        - History
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: The topic
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by messages after this timestamp (RFC3339 format)
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by messages before this timestamp (RFC3339 format)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Limit number of results
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Result offset for pagination
      responses:
        '200':
          description: Topic message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          description: Invalid parameters
        '401':
          description: Unauthorized
        '503':
          description: Storage not available

  /api/history/clients/{clientID}:
    get:
      operationId: getClientHistory
      summary: Get client history
      description: Get message history for a specific client
      tags:
        - History
      security:
        - bearerAuth: []
      parameters:
        - name: clientID
          in: path
          required: true
          schema:
            type: string
          description: The client ID
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by messages after this timestamp (RFC3339 format)
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by messages before this timestamp (RFC3339 format)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Limit number of results
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Result offset for pagination
      responses:
        '200':
          description: Client message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          description: Invalid parameters
        '401':
          description: Unauthorized
        '503':
          description: Storage not available

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Client:
      type: object
      properties:
        id:
          type: string
          description: Client identifier
        username:
          type: string
          description: Client username
        connected_at:
          type: string
          format: date-time
          description: Connection timestamp
        ip_address:
          type: string
          description: Client IP address
        protocol:
          type: string
          description: MQTT protocol version
        keep_alive:
          type: integer
          description: Keep alive interval in seconds
        clean_session:
          type: boolean
          description: Whether the session is clean
        subscriptions:
          type: array
          items:
            type: object
            properties:
              topic:
                type: string
              qos:
                type: integer
                enum: [0, 1, 2]

    Message:
      type: object
      properties:
        id:
          type: string
          description: Message identifier
        topic:
          type: string
          description: The topic
        payload:
          type: string
          description: Message payload
        qos:
          type: integer
          enum: [0, 1, 2]
          description: Quality of Service
        retained:
          type: boolean
          description: Whether the message is retained
        client_id:
          type: string
          description: ID of the client that published the message
        timestamp:
          type: string
          format: date-time
          description: When the message was published

    Permission:
      type: object
      properties:
        username:
          type: string
          description: User this permission applies to
        topic_pattern:
          type: string
          description: Topic pattern for the permission
        access_level:
          type: string
          enum: [read_only, read_write, admin]
          description: Permission level

    PermissionRequest:
      type: object
      required:
        - username
        - topic_pattern
        - access_level
      properties:
        username:
          type: string
          description: User to add permission for
        topic_pattern:
          type: string
          description: Topic pattern for the permission
        access_level:
          oneOf:
            - type: string
              enum: [read_only, read_write, admin]
            - type: integer
              enum: [1, 2, 3]
          description: Permission level (either string or integer)

    User:
      type: object
      properties:
        username:
          type: string
          description: Username
        is_admin:
          type: boolean
          description: Whether the user has admin privileges
        permissions:
          type: array
          items:
            type: string
          description: Formatted permissions list
        roles:
          type: array
          items:
            type: string
          description: Roles assigned to the user
        created_at:
          type: string
          format: date-time
          description: User creation timestamp
        last_login:
          type: string
          format: date-time
          description: Last login timestamp

    UserRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          description: Password
        is_admin:
          type: boolean
          description: Whether the user has admin privileges

    Role:
      type: object
      properties:
        name:
          type: string
          description: Role name
        description:
          type: string
          description: Role description
        permissions:
          type: array
          items:
            type: string
          description: Formatted permissions list
        created_at:
          type: string
          format: date-time
          description: Role creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Role update timestamp

    RoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Role name
        description:
          type: string
          description: Role description
        permissions:
          type: array
          items:
            type: object
            required:
              - topic_pattern
              - access_level
            properties:
              topic_pattern:
                type: string
                description: Topic pattern for the permission
              access_level:
                oneOf:
                  - type: string
                    enum: [read_only, read_write, admin]
                  - type: integer
                    enum: [1, 2, 3]
                description: Permission level (either string or integer) 