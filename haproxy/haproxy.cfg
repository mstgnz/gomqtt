global
    log stdout format raw local0
    maxconn 4096
    user haproxy
    group haproxy
    stats socket /var/run/haproxy.sock mode 666 level admin
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-server-options no-sslv3 no-tlsv10 no-tlsv11
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout queue 5s

# HAProxy statistics dashboard
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE

# MQTT TCP - Port 1883
frontend mqtt_tcp_frontend
    bind *:1883
    mode tcp
    default_backend mqtt_tcp_backend

backend mqtt_tcp_backend
    mode tcp
    balance roundrobin
    option tcp-check
    server node1 gomqtt-node1:1883 check
    server node2 gomqtt-node2:1883 check
    server node3 gomqtt-node3:1883 check

# MQTT TLS - Port 8883
frontend mqtt_tls_frontend
    bind *:8883 ssl crt /usr/local/etc/haproxy/certs/server.pem
    mode tcp
    default_backend mqtt_tls_backend

backend mqtt_tls_backend
    mode tcp
    balance roundrobin
    option tcp-check
    server node1 gomqtt-node1:8883 check ssl verify none
    server node2 gomqtt-node2:8883 check ssl verify none
    server node3 gomqtt-node3:8883 check ssl verify none

# MQTT WebSocket - Port 9001
frontend mqtt_ws_frontend
    bind *:9001
    mode http
    default_backend mqtt_ws_backend

backend mqtt_ws_backend
    mode http
    balance roundrobin
    option httpchk GET /mqtt
    http-check expect status 400
    server node1 gomqtt-node1:9001 check
    server node2 gomqtt-node2:9001 check
    server node3 gomqtt-node3:9001 check

# MQTT Secure WebSocket - Port 9443
frontend mqtt_wss_frontend
    bind *:9443 ssl crt /usr/local/etc/haproxy/certs/server.pem
    mode http
    default_backend mqtt_wss_backend

backend mqtt_wss_backend
    mode http
    balance roundrobin
    option httpchk GET /mqtt
    http-check expect status 400
    server node1 gomqtt-node1:9443 check ssl verify none
    server node2 gomqtt-node2:9443 check ssl verify none
    server node3 gomqtt-node3:9443 check ssl verify none 